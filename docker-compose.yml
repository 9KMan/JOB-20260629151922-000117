services:
  postgres:
    image: postgres:15-alpine
    container_name: bpa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bpa
      POSTGRES_PASSWORD: bpa
      POSTGRES_DB: bpa
    volumes:
      - bpa_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bpa -d bpa"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: bpa_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://bpa:bpa@postgres:5432/bpa
      ENVIRONMENT: production
      LOG_LEVEL: INFO
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"

volumes:
  bpa_pgdata:
